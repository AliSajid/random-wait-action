name: 'Build Tests'
on: # rebuild any PRs and main branch changes
    pull_request:
    push:
        branches:
            - 'main'
            - 'next'

permissions:
    contents: read

jobs:
    build: # make sure build/ci work properly
        runs-on: ubuntu-latest
        steps:
            - name: Harden Runner
              uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
              with:
                  disable-sudo: true
                  egress-policy: audit
                  allowed-endpoints: >
                      api.codacy.com:443
                      api.github.com:443
                      artifacts.codacy.com:443
                      cli.codecov.io:443
                      github.com:443
                      index.crates.io:443
                      ingest.codecov.io:443
                      keybase.io:443
                      mise-versions.jdx.dev:443
                      mise.jdx.dev:443
                      nodejs.org:443
                      o26192.ingest.us.sentry.io:443
                      raw.githubusercontent.com:443
                      registry.npmjs.org:443
                      release-assets.githubusercontent.com:443
                      static.crates.io:443
                      storage.googleapis.com:443

            - name: Checkout repository
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

            - name: Install mise
              uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
              with:
                  version: 2026.6.14
                  install_args: --yes

            - name: Run CI pipeline
              run: mise run ci

    test-with-params: # make sure the action works on a clean machine without building
        runs-on: ubuntu-latest
        steps:
            - name: Harden Runner
              uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
              with:
                  disable-sudo: true
                  egress-policy: audit
                  allowed-endpoints: >
                      github.com:443

            - name: Checkout repository
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

            - uses: ./
              with:
                  minimum: 1
                  maximum: 5

    test-without-params: # make sure the action works on a clean machine without building
        runs-on: ubuntu-latest
        steps:
            - name: Harden Runner
              uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
              with:
                  disable-sudo: true
                  egress-policy: audit
                  allowed-endpoints: >
                      github.com:443

            - name: Checkout repository
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

            - uses: ./

    update_test_coverage:
        runs-on: ubuntu-latest
        steps:
            - name: Harden Runner
              uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
              with:
                  disable-sudo: true
                  egress-policy: audit
                  allowed-endpoints: >
                      api.codacy.com:443
                      api.github.com:443
                      artifacts.codacy.com:443
                      cli.codecov.io:443
                      github.com:443
                      index.crates.io:443
                      ingest.codecov.io:443
                      mise-versions.jdx.dev:443
                      mise.jdx.dev:443
                      nodejs.org:443
                      raw.githubusercontent.com:443
                      registry.npmjs.org:443
                      release-assets.githubusercontent.com:443
                      static.crates.io:443

            - name: Checkout repository
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

            - name: Install mise
              uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
              with:
                  version: 2026.6.14
                  install_args: --yes

            - name: Generate Coverage Report
              run: mise run coverage

            - name: Upload results to Codecov
              uses: codecov/codecov-action@0fb7174895f61a3b6b78fc075e0cd60383518dac # v5
              with:
                  token: ${{ secrets.CODECOV_TOKEN }}

            - name: Run codacy-coverage-reporter
              uses: codacy/codacy-coverage-reporter-action@89d6c85cfafaec52c72b6c5e8b2878d33104c699 # v1.3.0
              with:
                  project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
                  coverage-reports: coverage/lcov.info
